<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>皇家對決 PvP - 網頁部署版</title>
  <!-- 引入 Tailwind CSS 進行排版 -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@500;700;900&display=swap');
    body { font-family: 'Noto Sans TC', sans-serif; touch-action: none; background-color: #222; margin: 0; }
    * { user-select: none; -webkit-user-select: none; }
    .animate-pulse-fast { animation: pulse 1s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: .7; transform: scale(1.05); } }
    .loader { border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid #f1c40f; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body class="fixed inset-0 flex justify-center items-center overflow-hidden">

  <!-- 遊戲主容器 -->
  <div class="relative w-full max-w-[450px] h-full max-h-[850px] bg-[#4caf50] shadow-2xl flex flex-col">
    
    <!-- 頂部對戰資訊 (遊戲中顯示) -->
    <div id="game-header" class="absolute top-0 left-0 w-full p-3 flex justify-between items-start pointer-events-none z-10 hidden">
      <div class="flex flex-col items-start gap-1">
        <div id="ui-my-name" class="bg-black/60 px-3 py-1 rounded-full text-white font-bold border border-white/20 shadow">玩家</div>
        <div id="ui-my-trophies" class="bg-black/60 px-2 py-0.5 rounded-full text-yellow-400 text-xs font-bold border border-yellow-500/30">🏆 0</div>
      </div>
      <div id="ui-timer" class="text-2xl font-black px-4 py-1 rounded-full border-2 bg-black/50 border-white/20 text-white">03:00</div>
      <div id="ui-opp-name" class="bg-black/60 px-3 py-1 rounded-full text-red-300 font-bold border border-red-500/50 flex items-center gap-1">⚔️ 對手</div>
    </div>

    <!-- 部署提示字卡 -->
    <div id="deploy-msg" class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-black/80 text-white px-5 py-2 rounded-full font-bold animate-bounce pointer-events-none z-10 shadow-lg text-sm hidden">
      點擊己方半場部署
    </div>

    <!-- 畫布 -->
    <canvas id="gameCanvas" width="450" height="800" class="flex-1 w-full min-h-0 bg-[#5d9e3e] block touch-none hidden"></canvas>

    <!-- 底部控制區 -->
    <div id="game-controls" class="bg-[#2c3e50] p-2 pb-[max(10px,env(safe-area-inset-bottom))] border-t-4 border-[#1a252f] flex-shrink-0 z-20 relative w-full hidden">
      <div class="w-full h-5 bg-black rounded-full overflow-hidden mb-2 relative border-2 border-slate-600">
        <div id="elixir-fill" class="h-full bg-gradient-to-r from-fuchsia-500 to-purple-600 transition-all duration-200" style="width: 50%"></div>
        <div id="elixir-text" class="absolute inset-0 flex items-center justify-center text-white text-xs font-bold drop-shadow-md">聖水: 5 / 10</div>
      </div>
      <div id="cards-container" class="flex justify-around h-20 gap-1 w-full">
        <!-- 卡牌由 JS 動態生成 -->
      </div>
    </div>

    <!-- 覆蓋層：大廳與配對 -->
    <div id="screen-setup" class="absolute inset-0 bg-slate-900 flex flex-col items-center justify-center p-4 z-50">
      <div class="bg-slate-800 p-8 rounded-2xl shadow-2xl w-full max-w-md border border-slate-700 text-center relative">
        <div class="absolute top-4 left-6 right-6 flex justify-between text-yellow-400 font-bold text-lg bg-black/30 px-4 py-2 rounded-full border border-slate-600">
          <span id="lobby-level">⭐ Lv.1</span>
          <span id="lobby-trophies">🏆 0</span>
        </div>

        <h1 class="text-4xl font-black mt-8 mb-2 text-transparent bg-clip-text bg-gradient-to-b from-yellow-300 to-yellow-600 drop-shadow-lg">皇家對決</h1>
        <p class="text-slate-400 mb-6 font-bold">即時線上對戰版</p>

        <!-- 設定表單 -->
        <div id="setup-form" class="space-y-4 block">
          <input type="text" id="input-name" class="w-full px-4 py-3 bg-slate-700 border-2 border-blue-500 rounded-lg focus:outline-none focus:ring-2 focus:ring-yellow-400 text-center text-xl font-bold text-white placeholder-slate-400" placeholder="輸入您的暱稱" maxlength="10">
          
          <button id="btn-random" class="w-full py-3 bg-gradient-to-b from-blue-500 to-blue-700 text-white font-bold text-lg rounded-xl shadow-[0_4px_0_#1e3a8a] active:translate-y-[4px] active:shadow-none transition-all">
            🔍 隨機配對
          </button>
          
          <div class="flex gap-2">
            <button id="btn-create" class="flex-1 py-3 bg-gradient-to-b from-emerald-500 to-emerald-700 text-white font-bold text-sm rounded-xl shadow-[0_4px_0_#064e3b] active:translate-y-[4px] active:shadow-none transition-all">
              ➕ 建立房間
            </button>
            <div class="flex-1 flex gap-1">
              <input type="text" id="input-code" placeholder="房間碼" maxlength="4" class="w-full bg-slate-700 border-2 border-emerald-500 rounded-xl text-center font-bold text-white focus:outline-none uppercase">
              <button id="btn-join" class="px-3 bg-emerald-600 hover:bg-emerald-500 text-white font-bold rounded-xl shadow-[0_4px_0_#064e3b] active:translate-y-[4px] active:shadow-none transition-all">加入</button>
            </div>
          </div>
          
          <button id="btn-practice" class="w-full py-3 bg-gradient-to-b from-purple-500 to-purple-700 text-white font-bold text-lg rounded-xl shadow-[0_4px_0_#4c1d95] active:translate-y-[4px] active:shadow-none transition-all mt-2">
            🤖 單機練習
          </button>

          <div class="mt-4 text-left text-xs text-slate-400 bg-slate-900/50 p-3 rounded-lg border border-slate-700">
            <p class="text-yellow-400 font-bold mb-1">💡 如何與朋友連線對戰？</p>
            <p class="mb-2">1. 把<span class="text-emerald-400 font-bold">最上方瀏覽器網址列的連結</span>複製傳給朋友。</p>
            <p>2. 一方點擊「建立房間」，將代碼告訴對方。</p>
            <p>3. 另一方輸入代碼點擊「加入」即可對戰！</p>
          </div>
        </div>

        <!-- 等待畫面 -->
        <div id="waiting-screen" class="space-y-6 flex flex-col items-center hidden">
          <div id="private-room-info" class="hidden flex-col items-center">
            <p class="text-xl font-bold text-yellow-300 mb-2">您的房間碼</p>
            <div id="room-code-display" class="text-6xl font-black text-white tracking-widest bg-black/50 px-8 py-4 rounded-2xl border-2 border-emerald-500 cursor-pointer hover:bg-black/70">0000</div>
            <p class="text-slate-400 mt-2">請將代碼告訴朋友以加入對戰</p>
          </div>
          
          <div id="loading-spinner" class="loader my-4"></div>
          <p id="match-status" class="text-xl font-bold text-blue-300">連線配對中...</p>
          <button id="btn-cancel" class="mt-4 w-full py-3 bg-red-600 hover:bg-red-700 text-white rounded-xl shadow-[0_4px_0_#7f1d1d] active:translate-y-[4px] active:shadow-none font-bold text-lg transition-all">取消</button>
        </div>
      </div>
    </div>

    <!-- 覆蓋層：VS 雙方橫幅 -->
    <div id="vs-banner" class="absolute inset-0 bg-black/95 z-50 flex flex-col items-center justify-center text-white hidden">
      <div class="flex items-center gap-4 w-full px-6 justify-between max-w-[400px]">
        <div class="flex flex-col items-center w-[100px]">
          <div class="text-5xl mb-3 border-4 border-blue-500 rounded-full bg-slate-800 w-20 h-20 flex items-center justify-center shadow-[0_0_15px_blue]">😎</div>
          <div id="vs-p1" class="text-lg font-bold text-blue-400 truncate w-full text-center">玩家</div>
        </div>
        <div class="text-6xl font-black text-yellow-500 italic drop-shadow-[0_0_15px_red] -skew-x-12">VS</div>
        <div class="flex flex-col items-center w-[100px]">
          <div class="text-5xl mb-3 border-4 border-red-500 rounded-full bg-slate-800 w-20 h-20 flex items-center justify-center shadow-[0_0_15px_red]">😈</div>
          <div id="vs-p2" class="text-lg font-bold text-red-400 truncate w-full text-center">對手</div>
        </div>
      </div>
      <div class="mt-12 text-2xl font-bold animate-pulse text-white tracking-widest">準備開戰...</div>
    </div>

    <!-- 覆蓋層：遊戲結束 -->
    <div id="screen-gameover" class="absolute inset-0 bg-black/90 z-50 flex flex-col items-center justify-center text-white hidden">
      <h2 id="go-title" class="text-5xl font-black mb-6 text-yellow-400 drop-shadow-[0_0_15px_#facc15]">勝利!</h2>
      <div class="bg-white/10 p-6 rounded-2xl border border-white/20 mb-8 text-center min-w-[200px]">
        <p id="go-reason" class="text-slate-300 mb-2">對戰結束</p>
        <p id="go-trophies" class="text-3xl font-bold text-emerald-400">🏆 +30</p>
      </div>
      <button id="btn-back" class="px-8 py-3 bg-blue-600 text-white font-bold rounded-xl text-xl hover:bg-blue-500 shadow-[0_4px_0_#1e3a8a] active:translate-y-[4px] active:shadow-none transition-all">
        返回大廳
      </button>
    </div>

  </div>

  <!-- ===================================================================== -->
  <!-- Firebase 模組與遊戲邏輯 -->
  <!-- ===================================================================== -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, onSnapshot, updateDoc, doc, getDocs, setDoc, deleteDoc, arrayUnion, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    // ⚠️ ===================================================== ⚠️
    const firebaseConfig = {
    apiKey: "AIzaSyDbjh-siRJx23qQPybbrlwVaOd8ajYPcUs",
    authDomain: "clashhh-48b07.firebaseapp.com",
    projectId: "clashhh-48b07",
    storageBucket: "clashhh-48b07.firebasestorage.app",
    messagingSenderId: "83908803774",
    appId: "1:83908803774:web:ed6f37736175d1469d32ef"
    };


    // 如果在測試環境中有注入設定，則優先使用
    const finalConfig = typeof __firebase_config !== 'undefined' && __firebase_config ? JSON.parse(__firebase_config) : firebaseConfig;
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'royal-clash-pvp-v1';

    let app, auth, db, currentUser;
    try {
      app = initializeApp(finalConfig);
      auth = getAuth(app);
      db = getFirestore(app);
      signInAnonymously(auth);
      onAuthStateChanged(auth, user => { currentUser = user; });
    } catch (e) {
      console.warn("Firebase 未設定，僅能使用單機模式。");
    }

    // --- 遊戲常數與狀態 ---
    const GAME_WIDTH = 450, GAME_HEIGHT = 800;
    const UNIT_TYPES = {
      KNIGHT: { name: '騎士', icon: '⚔️', cost: 3, hp: 600, dmg: 50, range: 40, speed: 1.5, attackSpeed: 60, type: 'melee' },
      ARCHER: { name: '弓箭手', icon: '🏹', cost: 3, hp: 250, dmg: 40, range: 200, speed: 1.1, attackSpeed: 50, type: 'range' },
      GIANT: { name: '巨人', icon: '👹', cost: 5, hp: 1600, dmg: 100, range: 40, speed: 0.8, attackSpeed: 90, type: 'building_target' },
      SKELETON: { name: '炸彈兵', icon: '💣', cost: 2, hp: 150, dmg: 100, range: 120, speed: 1.2, attackSpeed: 70, type: 'range' },
      FIREBALL: { name: '火球', icon: '🔥', cost: 4, type: 'spell', dmg: 350, range: 100 }
    };

    let state = {
      isOnline: false, matchId: null, playerRole: null, isPlaying: false, isStarting: false,
      playerName: localStorage.getItem('rc_name') || '玩家', opponentName: '電腦 AI',
      stats: JSON.parse(localStorage.getItem('rc_stats')) || { trophies: 0, level: 1 },
      elixir: 5, selectedCard: null
    };

    // DOM 元素快取
    const els = {
      setup: document.getElementById('screen-setup'), setupForm: document.getElementById('setup-form'),
      waiting: document.getElementById('waiting-screen'), gameover: document.getElementById('screen-gameover'),
      vsBanner: document.getElementById('vs-banner'),
      canvas: document.getElementById('gameCanvas'), controls: document.getElementById('game-controls'),
      header: document.getElementById('game-header'), cardsContainer: document.getElementById('cards-container'),
      nameInput: document.getElementById('input-name'), roomCodeInput: document.getElementById('input-code'),
      roomCodeDisplay: document.getElementById('room-code-display'), privateInfo: document.getElementById('private-room-info'),
      spinner: document.getElementById('loading-spinner'), matchStatus: document.getElementById('match-status'),
      elixirFill: document.getElementById('elixir-fill'), elixirText: document.getElementById('elixir-text'),
      deployMsg: document.getElementById('deploy-msg'), timer: document.getElementById('ui-timer')
    };

    els.nameInput.value = state.playerName;
    updateLobbyStats();

    function updateLobbyStats() {
      document.getElementById('lobby-level').innerText = `⭐ Lv.${state.stats.level}`;
      document.getElementById('lobby-trophies').innerText = `🏆 ${state.stats.trophies}`;
    }

    function saveStats() {
      localStorage.setItem('rc_stats', JSON.stringify(state.stats));
      localStorage.setItem('rc_name', state.playerName);
      updateLobbyStats();
    }

    // --- 連線配對邏輯 ---
    let unsubscribeMatch = null;

    async function startMatchmaking(mode) {
      state.playerName = els.nameInput.value.trim() || '無名英雄';
      saveStats();

      if (mode === 'offline') {
        state.isOnline = false; state.opponentName = '電腦 AI 🤖';
        state.isStarting = true;
        startGameUI();
        return;
      }

      if (!currentUser) return alert('尚未連線到伺服器 (請檢查 Firebase 設定)');
      
      els.setupForm.classList.add('hidden');
      els.waiting.classList.remove('hidden');
      els.privateInfo.classList.add('hidden');
      els.spinner.classList.remove('hidden');
      els.matchStatus.innerText = '尋找線上對手中...';
      state.isOnline = true;

      const matchesRef = collection(db, 'artifacts', appId, 'public', 'data', 'matches');
      try {
        const snap = await getDocs(matchesRef);
        let found = null; const now = Date.now();
        snap.forEach(docSnap => {
          const data = docSnap.data();
          if (!found && data.status === 'waiting' && !data.isPrivate && data.player1 !== currentUser.uid && (now - data.createdAt < 600000)) {
            found = { id: docSnap.id, ...data };
          }
        });

        if (found) {
          state.matchId = found.id; state.playerRole = 'player2';
          await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'matches', found.id), {
            player2: currentUser.uid, player2Name: state.playerName, status: 'playing', startTime: Date.now()
          });
          listenToMatch();
        } else {
          state.matchId = crypto.randomUUID(); state.playerRole = 'player1';
          await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'matches', state.matchId), {
            player1: currentUser.uid, player1Name: state.playerName, status: 'waiting', isPrivate: false, moves: [], createdAt: Date.now()
          });
          listenToMatch();
        }
      } catch (err) { alert('配對失敗：' + err.message); cancelMatchmaking(); }
    }

    async function createPrivateRoom() {
      if (!currentUser) return alert('尚未連線到伺服器');
      state.playerName = els.nameInput.value.trim() || '無名英雄'; saveStats();
      
      const code = String(Math.floor(1000 + Math.random() * 9000));
      els.setupForm.classList.add('hidden'); els.waiting.classList.remove('hidden');
      els.privateInfo.classList.remove('hidden'); els.spinner.classList.add('hidden');
      els.roomCodeDisplay.innerText = code; els.matchStatus.innerText = '等待對手輸入代碼...';
      
      state.isOnline = true; state.matchId = code; state.playerRole = 'player1';
      await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'matches', code), {
        player1: currentUser.uid, player1Name: state.playerName, status: 'waiting', isPrivate: true, moves: [], createdAt: Date.now()
      });
      listenToMatch();
    }

    async function joinPrivateRoom() {
      if (!currentUser) return;
      const code = els.roomCodeInput.value.trim().toUpperCase();
      if (!code) return;
      state.playerName = els.nameInput.value.trim() || '無名英雄'; saveStats();

      const matchRef = doc(db, 'artifacts', appId, 'public', 'data', 'matches', code);
      const snap = await getDoc(matchRef);
      if (snap.exists() && snap.data().status === 'waiting' && snap.data().isPrivate) {
        state.isOnline = true; state.matchId = code; state.playerRole = 'player2';
        await updateDoc(matchRef, { player2: currentUser.uid, player2Name: state.playerName, status: 'playing', startTime: Date.now() });
        listenToMatch();
      } else {
        alert("找不到該房間，或對戰已開始！");
      }
    }

    async function cancelMatchmaking() {
      if (unsubscribeMatch) { unsubscribeMatch(); unsubscribeMatch = null; }
      if (state.matchId && state.playerRole === 'player1') {
        try { await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'matches', state.matchId)); } catch(e){}
      }
      state.matchId = null; state.playerRole = null; state.isOnline = false;
      els.setupForm.classList.remove('hidden'); els.waiting.classList.add('hidden');
    }

    function listenToMatch() {
      unsubscribeMatch = onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'matches', state.matchId), snap => {
        if (!snap.exists()) {
          if (state.isPlaying) triggerGameOver('player', '對手逃跑');
          return;
        }
        const data = snap.data();
        
        // 核心修改：接收伺服器同步的勝負結果，確保兩邊同時結束遊戲
        if (data.winner && state.isPlaying) {
            let myResult = 'draw';
            if (data.winner !== 'draw') {
                myResult = data.winner === state.playerRole ? 'player' : 'enemy';
            }
            triggerGameOver(myResult, '對戰結束');
            return;
        }

        if (data.status === 'playing' && !state.isPlaying && !state.isStarting) {
          state.isStarting = true;
          state.opponentName = state.playerRole === 'player1' ? (data.player2Name || '對手') : (data.player1Name || '對手');
          startGameUI();
        }
        if (data.status === 'playing' && state.isPlaying && data.moves) {
          engine.syncMoves(data.moves);
        }
      });
    }

    // --- UI 切換與遊戲啟動 ---
    let engine = null;

    function startGameUI() {
      els.setup.classList.add('hidden');
      els.waiting.classList.add('hidden');
      
      // 顯示對戰橫幅 1.5 秒
      document.getElementById('vs-p1').innerText = state.playerName;
      document.getElementById('vs-p2').innerText = state.opponentName;
      els.vsBanner.classList.remove('hidden');

      setTimeout(() => {
        els.vsBanner.classList.add('hidden');
        
        els.header.classList.remove('hidden');
        els.canvas.classList.remove('hidden');
        els.controls.classList.remove('hidden');
        
        document.getElementById('ui-my-name').innerText = state.playerName;
        document.getElementById('ui-my-trophies').innerText = `🏆 ${state.stats.trophies}`;
        document.getElementById('ui-opp-name').innerText = `⚔️ ${state.opponentName}`;
        
        state.elixir = 5; state.selectedCard = null;
        renderCards(); updateElixirBar();

        engine = new GameEngine(els.canvas, {
          isOnline: state.isOnline, playerRole: state.playerRole,
          onGameOver: async (winner) => {
            // 核心修改：第一時間將勝負寫入資料庫，廣播給對手強制結算
            if (state.isOnline) {
                let globalWinner = 'draw';
                if (winner === 'player') globalWinner = state.playerRole;
                else if (winner === 'enemy') globalWinner = state.playerRole === 'player1' ? 'player2' : 'player1';
                
                try {
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'matches', state.matchId), { 
                        winner: globalWinner,
                        status: 'finished'
                    });
                } catch(e) {}
            }
            triggerGameOver(winner);
          },
          onMove: async (m) => {
            if (state.isOnline) await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'matches', state.matchId), { moves: arrayUnion(m) });
          },
          onElixirUpdate: (val) => { state.elixir = val; updateElixirBar(); },
          onTimeUpdate: (t) => {
            const s = `0${Math.floor(t/60)}:${(t%60).toString().padStart(2,'0')}`;
            els.timer.innerText = s;
            if (t <= 60) els.timer.classList.add('warning', 'text-red-500'); else els.timer.classList.remove('warning', 'text-red-500');
          },
          onCardUsed: () => { state.selectedCard = null; renderCards(); els.deployMsg.classList.add('hidden'); }
        });
        engine.start();
        state.isPlaying = true;
        state.isStarting = false;
      }, 1500);
    }

    function triggerGameOver(winnerTeam, reason = '對戰結束') {
      if (!state.isPlaying) return;
      state.isPlaying = false; engine.stop();
      
      let tChange = 0;
      if (state.isOnline) {
         if (winnerTeam === 'player') tChange = 30;
         else if (winnerTeam === 'enemy') tChange = -20;
         state.stats.trophies = Math.max(0, state.stats.trophies + tChange);
         saveStats();
      }

      document.getElementById('go-title').innerText = winnerTeam === 'player' ? '勝利!' : (winnerTeam === 'enemy' ? '落敗' : '平手');
      document.getElementById('go-title').className = `text-5xl font-black mb-6 ${winnerTeam === 'player' ? 'text-yellow-400 drop-shadow-[0_0_15px_#facc15]' : 'text-slate-400'}`;
      document.getElementById('go-reason').innerText = reason;
      
      const tcEl = document.getElementById('go-trophies');
      tcEl.innerText = tChange > 0 ? `🏆 +${tChange}` : `🏆 ${tChange}`;
      tcEl.className = `text-3xl font-bold ${tChange > 0 ? 'text-emerald-400' : (tChange < 0 ? 'text-red-400' : 'text-slate-400')}`;
      
      els.gameover.classList.remove('hidden');
    }

    // --- 卡牌與介面邏輯 ---
    function updateElixirBar() {
      els.elixirFill.style.width = `${(Math.floor(state.elixir) / 10) * 100}%`;
      els.elixirText.innerText = `聖水: ${Math.floor(state.elixir)} / 10`;
      renderCards(); 
    }

    function renderCards() {
      els.cardsContainer.innerHTML = '';
      Object.entries(UNIT_TYPES).forEach(([key, unit]) => {
        const canAfford = state.elixir >= unit.cost;
        const isSel = state.selectedCard === key;
        const div = document.createElement('div');
        
        // 修改：讓選取的卡牌無論是否足夠聖水都有黃色外框，且移除點擊限制
        div.className = `flex-1 bg-slate-200 rounded-lg relative flex flex-col items-center justify-center cursor-pointer transition-transform touch-none select-none ` + 
                        `${isSel ? 'border-4 border-yellow-400 bg-white -translate-y-2' : 'hover:-translate-y-1 border-b-4 border-slate-400'} ` + 
                        `${!canAfford ? (isSel ? 'opacity-80' : 'opacity-50 grayscale') : ''}`;
                        
        div.innerHTML = `
          <div class="pointer-events-none absolute -top-2 -left-2 w-6 h-6 bg-purple-600 rounded-full flex items-center justify-center text-white text-xs font-bold border-2 border-white shadow-sm z-10">${unit.cost}</div>
          <div class="pointer-events-none text-2xl filter drop-shadow-sm">${unit.icon}</div>
          <div class="pointer-events-none text-[10px] font-black text-slate-800 mt-1">${unit.name}</div>
        `;
        div.onpointerdown = (e) => {
          e.preventDefault();
          // 移除 canAfford 判斷，允許隨時「預選」卡牌
          state.selectedCard = isSel ? null : key;
          renderCards();
          if (state.selectedCard) {
            els.deployMsg.innerText = unit.type === 'spell' ? '點擊任意位置施放' : '點擊己方半場部署';
            els.deployMsg.classList.remove('hidden');
          } else {
            els.deployMsg.classList.add('hidden');
          }
        };
        els.cardsContainer.appendChild(div);
      });
    }

    // 點擊事件綁定
    document.getElementById('btn-random').onclick = () => startMatchmaking('online');
    document.getElementById('btn-practice').onclick = () => startMatchmaking('offline');
    document.getElementById('btn-create').onclick = createPrivateRoom;
    document.getElementById('btn-join').onclick = joinPrivateRoom;
    document.getElementById('btn-cancel').onclick = cancelMatchmaking;
    document.getElementById('btn-back').onclick = async () => {
      if (unsubscribeMatch) unsubscribeMatch();
      if (state.isOnline && state.matchId && state.playerRole === 'player1') {
        try { await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'matches', state.matchId)); } catch(e){}
      }
      state.isOnline = false; state.matchId = null;
      els.gameover.classList.add('hidden'); els.canvas.classList.add('hidden');
      els.header.classList.add('hidden'); els.controls.classList.add('hidden');
      els.setup.classList.remove('hidden'); els.setupForm.classList.remove('hidden'); els.waiting.classList.add('hidden');
    };

    els.canvas.addEventListener('pointerdown', (e) => {
      if (!state.selectedCard || !state.isPlaying) return;
      const rect = els.canvas.getBoundingClientRect();
      const cx = (e.clientX - rect.left) * (GAME_WIDTH / rect.width);
      const cy = (e.clientY - rect.top) * (GAME_HEIGHT / rect.height);
      const u = UNIT_TYPES[state.selectedCard];

      if (u.type === 'spell' || cy > GAME_HEIGHT / 2 + 30) {
        if (state.elixir >= u.cost) {
          state.elixir -= u.cost; updateElixirBar();
          engine.spawnLocal(state.selectedCard, cx, cy, 'player');
          if (state.isOnline) {
            const sx = state.playerRole === 'player2' ? GAME_WIDTH - cx : cx;
            const sy = state.playerRole === 'player2' ? GAME_HEIGHT - cy : cy;
            engine.config.onMove({ id: crypto.randomUUID(), p: state.playerRole, type: state.selectedCard, x: sx, y: sy });
          }
          engine.config.onCardUsed();
        }
      } else {
        engine.particles.push({ x: cx, y: cy, life: 20, type: 'cross' });
      }
    });

    // --- 實體與物理引擎 ---
    class Entity {
      constructor(x, y, team, stats, isTower = false, isMain = false) {
        this.x=x; this.y=y; this.team=team; this.hp=stats.hp; this.maxHp=stats.hp; this.dmg=stats.dmg; this.range=stats.range;
        this.speed=stats.speed; this.attackSpeed=stats.attackSpeed; this.type=stats.type; this.icon=stats.icon;
        this.isTower=isTower; this.isMain=isMain; this.cooldown=0; this.dead=false; this.target=null; this.radius=isTower?25:15;
        this.isActive = !isMain; // 主堡預設不啟動，被攻擊或隊友塔掉落才甦醒
        this.deployTimer = isTower ? 0 : 60; // 新增：下牌準備時間 (60 Ticks = 1秒)
      }
      
      moveTowards(tx, ty) {
        if (this.isTower) return;
        let destX = tx, destY = ty;
        const middleY = GAME_HEIGHT / 2;
        const riverTop = middleY - 25; 
        const riverBottom = middleY + 25; 
        
        const leftBridge = 80;
        const rightBridge = GAME_WIDTH - 80;
        const targetBridge = Math.abs(this.x - leftBridge) < Math.abs(this.x - rightBridge) ? leftBridge : rightBridge;

        // 尋路演算法：過河必須強制走橋樑，嚴禁水上飄
        const isTargetUp = ty < riverTop;
        const isTargetDown = ty > riverBottom;
        const isUnitUp = this.y < riverTop;
        const isUnitDown = this.y > riverBottom;
        const inRiver = this.y >= riverTop && this.y <= riverBottom;

        if ((isUnitDown && isTargetUp) || (isUnitUp && isTargetDown) || inRiver) {
            if (Math.abs(this.x - targetBridge) > 5) {
                // 還沒對齊橋樑，先走到橋口
                destX = targetBridge;
                if (isUnitDown) destY = riverBottom + 10;
                else if (isUnitUp) destY = riverTop - 10;
                else destY = this.y; 
            } else {
                // 已經在橋樑 X 軸上，筆直走過橋
                destX = targetBridge;
                destY = ty < middleY ? riverTop - 10 : riverBottom + 10;
            }
        }
        
        const dX = destX - this.x, dY = destY - this.y;
        const dist = Math.hypot(dX, dY);
        if (dist > 0) { this.x += (dX / dist) * this.speed; this.y += (dY / dist) * this.speed; }
      }

      update(ents, cPart) {
        if(this.dead)return; 
        
        // 如果還在部署中，跳過動作更新
        if(this.deployTimer > 0) {
            this.deployTimer--;
            return;
        }

        if(this.cooldown>0)this.cooldown--;
        
        // 判斷主堡甦醒條件
        if (this.isMain && !this.isActive) {
           if (this.hp < this.maxHp) {
               this.isActive = true;
           } else {
               const myTowers = ents.filter(e => e.team === this.team && e.isTower && !e.isMain);
               if (myTowers.length < 2) this.isActive = true;
           }
        }
        if (this.isMain && !this.isActive) return; // 睡眠中的主堡不索敵

        // 皇室戰爭：仇恨值與動態拉扯 (Kiting) 系統
        let closestEnemy = null;
        let minDist = Infinity;
        const AGGRO_RADIUS = 150; // 降低仇恨拉扯的感應範圍

        ents.forEach(e => {
            if (e.team !== this.team && !e.dead && e.deployTimer <= 0) { // 不會鎖定還在部署中的單位
                const d = Math.hypot(e.x - this.x, e.y - this.y);
                if (this.isTower && d > this.range) return;
                if (this.type === 'building_target' && !e.isTower) return;
                if (d < minDist) { minDist = d; closestEnemy = e; }
            }
        });

        if (!this.target || this.target.dead) {
            this.target = closestEnemy;
        } else if (closestEnemy && closestEnemy !== this.target) {
            const currentDist = Math.hypot(this.target.x - this.x, this.target.y - this.y);
            if (this.isTower && currentDist > this.range) {
                this.target = closestEnemy; // 防禦塔目標走遠則換目標
            } else if (!this.isTower && currentDist > this.range && minDist < AGGRO_RADIUS && minDist < currentDist - 20) {
                // 核心拉扯邏輯：修改為只有極近距離(AGGRO_RADIUS)內出現新敵人才會轉移仇恨
                this.target = closestEnemy;
            }
        }

        // 執行攻擊或移動
        if(this.target) {
          const d=Math.hypot(this.target.x-this.x, this.target.y-this.y);
          if(d<=this.range) { 
              if(this.cooldown<=0) {
                  this.cooldown=this.attackSpeed; 
                  let fy=this.isTower?this.y-25:this.y;
                  if(this.type==='range') cPart({x:this.x,y:fy,tx:this.target.x,ty:this.target.y,target:this.target,dmg:this.dmg,life:30,type:'arrow',speed:12});
                  else { this.target.takeDamage(this.dmg,cPart); cPart({x:this.target.x,y:this.target.y,life:10,type:'hit'}); }
              }
          } else if(!this.isTower) {
            this.moveTowards(this.target.x, this.target.y);
          }
        } else if(!this.isTower) {
          const ty=this.team==='player'?95:GAME_HEIGHT-95;
          this.moveTowards(this.x, ty);
        }
      }
      
      takeDamage(a,cp) { 
        this.hp-=a; 
        if (this.isMain) this.isActive = true; // 被攻擊強制甦醒
        if(this.hp<=0){this.hp=0; this.dead=true; cp({x:this.x,y:this.y,life:30,type:'smoke',radius:15});} 
      }
      
      draw(ctx) {
        ctx.save();
        // 部署時呈現半透明
        if (this.deployTimer > 0) ctx.globalAlpha = 0.6;
        
        ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(this.x-16,this.y-31,32,6);
        ctx.fillStyle=this.team==='enemy'?'#ff7675':'#74b9ff'; ctx.fillRect(this.x-15,this.y-30,30*(this.hp/this.maxHp),4);
        
        // 部署時的讀條動畫
        if (this.deployTimer > 0) {
            const pct = 1 - (this.deployTimer / 60);
            ctx.fillStyle = 'white';
            ctx.fillRect(this.x-15, this.y-25, 30 * pct, 2);
        }

        ctx.font="24px sans-serif"; ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.beginPath(); ctx.arc(this.x,this.y+5,12,0,Math.PI*2);
        ctx.fillStyle=this.team==='player'?'rgba(52,152,219,0.4)':'rgba(231,76,60,0.4)'; ctx.fill(); ctx.fillText(this.icon,this.x,this.y);
        
        if(this.isMain) {
            ctx.fillText('👑',this.x,this.y-15);
            if (!this.isActive) {
                ctx.font="12px sans-serif"; ctx.fillStyle="white";
                ctx.fillText('Zzz', this.x+15, this.y-15);
            }
        }
        ctx.restore();
      }
    }

    class GameEngine {
      constructor(c, cfg) { 
          this.c=c; this.ctx=c.getContext('2d'); this.config=cfg; 
          this.ents=[]; this.parts=[]; this.pMoves=new Set(); 
          this.eElix=5; this.time=180; this.logicTimer=0; 
          
          // 新增：用於計算真實時間差的變數
          this.lastLogicTime = 0; 
          this.accumulator = 0;

          this.logicLoop = this.logicLoop.bind(this);
          this.renderLoop = this.renderLoop.bind(this);
      }
      start() {
        this.ents.push(new Entity(GAME_WIDTH/2,95,'enemy',{hp:3000,dmg:80,range:200,attackSpeed:60,icon:'🏰',type:'range'},true,true));
        this.ents.push(new Entity(80,155,'enemy',{hp:1800,dmg:60,range:200,attackSpeed:60,icon:'🏯',type:'range'},true,false));
        this.ents.push(new Entity(GAME_WIDTH-80,155,'enemy',{hp:1800,dmg:60,range:200,attackSpeed:60,icon:'🏯',type:'range'},true,false));
        this.ents.push(new Entity(GAME_WIDTH/2,GAME_HEIGHT-95,'player',{hp:3000,dmg:80,range:200,attackSpeed:60,icon:'🏰',type:'range'},true,true));
        this.ents.push(new Entity(80,GAME_HEIGHT-155,'player',{hp:1800,dmg:60,range:200,attackSpeed:60,icon:'🏯',type:'range'},true,false));
        this.ents.push(new Entity(GAME_WIDTH-80,GAME_HEIGHT-155,'player',{hp:1800,dmg:60,range:200,attackSpeed:60,icon:'🏯',type:'range'},true,false));
        
        // 初始化真實時間
        this.lastLogicTime = Date.now();
        this.accumulator = 0;

        // 鎖定 60 Tick 確保所有裝置物理與勝負判定完全同步
        this.logicInt = setInterval(this.logicLoop, 1000 / 60);
        this.fId = requestAnimationFrame(this.renderLoop);
      }
      stop() { clearInterval(this.logicInt); cancelAnimationFrame(this.fId); }
      syncMoves(ms) { ms.forEach(m=>{if(!this.pMoves.has(m.id)&&m.p!==this.config.playerRole){this.pMoves.add(m.id); this.spawnLocal(m.type,this.config.playerRole==='player2'?GAME_WIDTH-m.x:m.x,this.config.playerRole==='player2'?GAME_HEIGHT-m.y:m.y,'enemy');}}); }
      spawnLocal(t,x,y,tm) {
        if(UNIT_TYPES[t].type==='spell') this.parts.push({x:GAME_WIDTH/2,y:tm==='player'?GAME_HEIGHT:0,tx:x,ty:y,vx:(x-GAME_WIDTH/2)/25,vy:(y-(tm==='player'?GAME_HEIGHT:0))/25,life:25,type:'fireball',dmg:UNIT_TYPES[t].dmg,radius:UNIT_TYPES[t].range,team:tm});
        else { this.ents.push(new Entity(x,y,tm,UNIT_TYPES[t])); this.parts.push({x,y,life:20,type:'ring',radius:1}); }
      }
      
      logicLoop() {
        if(!state.isPlaying) return; 
        
        const now = Date.now();
        let elapsed = now - this.lastLogicTime;
        this.lastLogicTime = now;

        // 核心修改：防呆限制。如果切換分頁超過 15 秒，限制最多一次補償 15 秒的邏輯
        // 避免休眠太久導致 while 迴圈卡死瀏覽器
        if (elapsed > 15000) elapsed = 15000;

        this.accumulator += elapsed;
        const tickRate = 1000 / 60;

        // 追趕機制：只要有流失的時間，就瘋狂執行邏輯直到補齊進度
        while (this.accumulator >= tickRate) {
            this.tickLogic();
            this.accumulator -= tickRate;
            if (!state.isPlaying) break; // 若在結算時停止，立刻中斷
        }
      }

      // 將原先的 logicLoop 內容移到這裡，專門處理「每 1 個物理幀」該做的事
      tickLogic() {
        this.logicTimer++;
        if (this.logicTimer % 60 === 0) {
            this.time--; 
            this.config.onTimeUpdate(this.time); 
            if (this.time <= 0) { this.chkWin(); return; }
        }

        const elixirInterval = this.time <= 60 ? 30 : 60;
        if (this.logicTimer % elixirInterval === 0) {
            if(state.elixir < 10) this.config.onElixirUpdate(state.elixir + 0.5); 
            if(!this.config.isOnline && this.eElix < 10) this.eElix += 0.5;
        }

        if(!this.config.isOnline && this.eElix >= 4 && Math.random() < 0.02) {
          const ks=Object.keys(UNIT_TYPES).filter(k=>UNIT_TYPES[k].type!=='spell'); const rk=ks[Math.floor(Math.random()*ks.length)];
          if(this.eElix>=UNIT_TYPES[rk].cost){this.eElix-=UNIT_TYPES[rk].cost; this.spawnLocal(rk,Math.random()>0.5?80:GAME_WIDTH-80,250,'enemy');}
        }
        
        this.ents.forEach(e=>e.update(this.ents,p=>this.parts.push(p)));
        
        // 第一時間觸發勝利/落敗，確保兩端即時一致
        if(this.ents.find(e=>e.team==='player'&&e.isMain)?.dead) { this.chkWin(); return; }
        if(this.ents.find(e=>e.team==='enemy'&&e.isMain)?.dead) { this.chkWin(); return; }
        
        this.ents=this.ents.filter(e=>!e.dead);
        
        for(let i=this.parts.length-1;i>=0;i--){
          let p=this.parts[i];
          if(p.type==='arrow'){
              const d=Math.hypot(p.target.x-p.x,p.target.y-p.y);
              if(d<p.speed||p.target.dead){
                  if(!p.target.dead){p.target.takeDamage(p.dmg,pt=>this.parts.push(pt));this.parts.push({x:p.target.x,y:p.target.y,life:10,type:'hit'});}
                  this.parts.splice(i,1);
              } else {
                  p.x+=((p.target.x-p.x)/d)*p.speed;p.y+=((p.target.y-p.y)/d)*p.speed;
              }
          }
          else if(p.type==='fireball'){
              p.x+=p.vx;p.y+=p.vy;p.life--;
              if(p.life<=0){
                  this.ents.forEach(e=>{if(e.team!==p.team&&Math.hypot(e.x-p.tx,e.y-p.ty)<=p.radius)e.takeDamage(p.dmg,pt=>this.parts.push(pt));});
                  this.parts.push({x:p.tx,y:p.ty,life:30,type:'fire_explosion',radius:p.radius});
                  this.parts.splice(i,1);
              }
          }
          else{
              p.life--;if(p.life<=0)this.parts.splice(i,1);
              if(p.type==='ring')p.radius+=2;
              if(p.type==='smoke')p.y-=1.5;
          }
        }
      }

      renderLoop() {
        if(!state.isPlaying) return;
        
        this.ctx.fillStyle='#5d9e3e'; this.ctx.fillRect(0,0,GAME_WIDTH,GAME_HEIGHT); 
        this.ctx.fillStyle='#4fc3f7'; this.ctx.fillRect(0,GAME_HEIGHT/2-20,GAME_WIDTH,40); 
        this.ctx.fillStyle='#8d6e63'; this.ctx.fillRect(50,GAME_HEIGHT/2-25,60,50); this.ctx.fillRect(GAME_WIDTH-110,GAME_HEIGHT/2-25,60,50);
        
        if(state.selectedCard){if(UNIT_TYPES[state.selectedCard].type==='spell'){this.ctx.fillStyle='rgba(255,68,68,0.15)';this.ctx.fillRect(0,0,GAME_WIDTH,GAME_HEIGHT);}else{this.ctx.fillStyle='rgba(255,255,255,0.15)';this.ctx.fillRect(0,GAME_HEIGHT/2+30,GAME_WIDTH,GAME_HEIGHT/2-30);}}
        
        this.ents.sort((a,b)=>a.y-b.y).forEach(e=>e.draw(this.ctx));
        
        this.parts.forEach(p=>{
          if(p.type==='arrow'){this.ctx.fillStyle='white';this.ctx.beginPath();this.ctx.arc(p.x,p.y,3,0,Math.PI*2);this.ctx.fill();}
          else if(p.type==='hit'){this.ctx.fillStyle='orange';this.ctx.fillRect(p.x-5,p.y-5,10,10);}
          else if(p.type==='smoke'){this.ctx.fillStyle='rgba(150,150,150,0.6)';this.ctx.beginPath();this.ctx.arc(p.x,p.y,p.radius,0,Math.PI*2);this.ctx.fill();}
          else if(p.type==='cross'){this.ctx.strokeStyle='red';this.ctx.lineWidth=4;this.ctx.beginPath();this.ctx.moveTo(p.x-10,p.y-10);this.ctx.lineTo(p.x+10,p.y+10);this.ctx.moveTo(p.x+10,p.y-10);this.ctx.lineTo(p.x-10,p.y+10);this.ctx.stroke();}
          else if(p.type==='fireball'){this.ctx.fillStyle='#ff4400';this.ctx.beginPath();this.ctx.arc(p.x,p.y,12,0,Math.PI*2);this.ctx.fill();}
          else if(p.type==='fire_explosion'){this.ctx.fillStyle=`rgba(255,80,0,${p.life/30})`;this.ctx.beginPath();this.ctx.arc(p.x,p.y,p.radius,0,Math.PI*2);this.ctx.fill();}
        });
        
        this.fId = requestAnimationFrame(this.renderLoop);
      }
      
      chkWin() {
        this.stop();
        const pMain = this.ents.find(e=>e.team==='player'&&e.isMain);
        const eMain = this.ents.find(e=>e.team==='enemy'&&e.isMain);
        
        if (pMain?.dead) { this.config.onGameOver('enemy'); return; }
        if (eMain?.dead) { this.config.onGameOver('player'); return; }
        
        const pT=this.ents.filter(e=>e.team==='player'&&e.isTower), eT=this.ents.filter(e=>e.team==='enemy'&&e.isTower);
        if(pT.length>eT.length) this.config.onGameOver('player'); 
        else if(eT.length>pT.length) this.config.onGameOver('enemy');
        else {
            const pH=pT.reduce((s,t)=>s+t.hp,0), eH=eT.reduce((s,t)=>s+t.hp,0); 
            if(pH>eH) this.config.onGameOver('player'); 
            else if(eH>pH) this.config.onGameOver('enemy'); 
            else this.config.onGameOver('draw');
        }
      }
    }
    // 1. 禁用滑鼠右鍵 (防止點擊「檢查」或「檢視網頁原始碼」)
    document.addEventListener('contextmenu', function(e) {
    e.preventDefault();
   });

// 2. 禁用常用的開發者工具快捷鍵
    document.addEventListener('keydown', function(e) {
  // 阻擋 F12
    if (e.key === 'F12' || e.keyCode === 123) {
    e.preventDefault();
  }
  // 阻擋 Ctrl+Shift+I (Windows 打開開發者工具) 或 Cmd+Opt+I (Mac)
    if ((e.ctrlKey || e.metaKey) && e.shiftKey && (e.key === 'I' || e.key === 'i')) {
    e.preventDefault();
  }
  // 阻擋 Ctrl+Shift+J (打開控制台)
    if ((e.ctrlKey || e.metaKey) && e.shiftKey && (e.key === 'J' || e.key === 'j')) {
    e.preventDefault();
  }
  // 阻擋 Ctrl+U (Windows 檢視網頁原始碼) 或 Cmd+Opt+U (Mac)
    if ((e.ctrlKey || e.metaKey) && (e.key === 'U' || e.key === 'u')) {
    e.preventDefault();
  }
  });
  </script>
